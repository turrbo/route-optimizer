<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mueller Reports Route Optimizer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 420px;
      min-height: 440px;
      max-height: 600px;
      font-family: 'Raleway', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #292929;
      background: #ffffff;
      overflow: hidden;
    }

    .header {
      background: #c8102e;
      color: white;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .header-title h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header-title p {
      font-size: 11px;
      opacity: 0.9;
      margin-top: 2px;
    }

    .header-badge {
      background: rgba(255,255,255,0.2);
      color: white;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: #f5f5f5;
      border-bottom: 1px solid #e0e0e0;
    }

    .tab {
      flex: 1;
      padding: 10px 8px;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      cursor: pointer;
      border: none;
      background: transparent;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      border-bottom: 2px solid transparent;
    }

    .tab:hover {
      color: #292929;
      background: #eee;
    }

    .tab.active {
      color: #c8102e;
      border-bottom-color: #c8102e;
      background: white;
    }

    /* Tab Content */
    .tab-content {
      display: none;
      padding: 16px 20px;
      max-height: 460px;
      overflow-y: auto;
    }

    .tab-content.active {
      display: block;
    }

    /* --- Excel Import Tab --- */
    .upload-zone {
      border: 2px dashed #ddd;
      border-radius: 6px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
      background: #fafafa;
    }

    .upload-zone:hover {
      border-color: #c8102e;
      background: #fff5f5;
    }

    .upload-zone.dragging {
      border-color: #c8102e;
      background: #fff5f5;
    }

    .upload-icon {
      font-size: 28px;
      margin-bottom: 6px;
      display: block;
    }

    .upload-text {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    .upload-text strong {
      color: #c8102e;
    }

    .file-input {
      display: none;
    }

    .file-info {
      display: none;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 4px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .file-info.active {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .file-name {
      font-weight: 600;
      color: #166534;
    }

    .file-remove {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
    }

    /* Import Preview */
    .import-preview {
      display: none;
      margin-top: 12px;
    }

    .import-preview.active {
      display: block;
    }

    .import-summary {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .summary-card {
      flex: 1;
      min-width: 80px;
      background: #f5f5f5;
      border-radius: 4px;
      padding: 8px 10px;
      text-align: center;
    }

    .summary-card .num {
      font-size: 18px;
      font-weight: 700;
      color: #292929;
    }

    .summary-card .label {
      font-size: 10px;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .summary-card.flagged {
      background: #fff7ed;
      border: 1px solid #fed7aa;
    }

    .summary-card.flagged .num {
      color: #ea580c;
    }

    .import-day-group {
      margin-bottom: 10px;
    }

    .import-day-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #c8102e;
      padding: 6px 0 4px 0;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 4px;
      display: flex;
      justify-content: space-between;
    }

    .import-day-header .home-label {
      font-weight: 400;
      font-size: 10px;
      color: #2563eb;
    }

    .import-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 8px;
      font-size: 11px;
      border-radius: 3px;
      margin-bottom: 3px;
      border: 1px solid #e8e8e8;
    }

    .import-item.flagged {
      border-color: #fed7aa;
      background: #fff7ed;
    }

    .import-item .case-num {
      font-weight: 700;
      color: #292929;
      min-width: 68px;
    }

    .import-item .survey-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      background: #dbeafe;
      color: #1e40af;
    }

    .import-item .mileage-badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 3px;
      background: #fee2e2;
      color: #dc2626;
    }

    .import-item .mileage-ok {
      background: #dcfce7;
      color: #166534;
    }

    .import-item .address-found {
      display: block;
      font-size: 10px;
      color: #16a34a;
      margin-top: 2px;
      word-wrap: break-word;
      line-height: 1.3;
    }

    .import-item .address-pending {
      display: block;
      font-size: 10px;
      color: #999;
      margin-top: 2px;
      font-style: italic;
    }

    .import-item .address-error {
      display: block;
      font-size: 10px;
      color: #dc2626;
      margin-top: 2px;
    }

    .import-item .item-details {
      flex: 1;
      min-width: 0;
    }

    /* Case Lookup Tab */
    .case-input-section {
      margin-bottom: 16px;
    }

    .case-input-section label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #292929;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .case-input-section p {
      font-size: 11px;
      color: #999;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 90px;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Courier New', monospace;
      resize: vertical;
      line-height: 1.6;
    }

    textarea:focus {
      outline: none;
      border-color: #c8102e;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-primary {
      background: #c8102e;
      color: white;
    }

    .btn-primary:hover {
      background: #a00d25;
    }

    .btn-primary:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #292929;
      color: white;
    }

    .btn-secondary:hover {
      background: #1a1a1a;
    }

    .btn-secondary:disabled {
      background: #999;
      cursor: not-allowed;
    }

    .btn-outline {
      background: white;
      color: #292929;
      border: 1px solid #ddd;
    }

    .btn-outline:hover {
      background: #f5f5f5;
    }

    .btn-block {
      width: 100%;
      display: block;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 11px;
    }

    /* Progress Bar */
    .progress-section {
      display: none;
      margin-bottom: 16px;
    }

    .progress-section.active {
      display: block;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: #e0e0e0;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #c8102e;
      border-radius: 4px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .progress-status {
      font-size: 11px;
      color: #999;
      margin-top: 6px;
    }

    /* Results List */
    .results-section {
      margin-top: 16px;
    }

    .results-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #292929;
      margin-bottom: 8px;
    }

    .result-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 4px;
      margin-bottom: 6px;
      font-size: 12px;
      border: 1px solid #e0e0e0;
    }

    .result-item.success {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .result-item.error {
      background: #fef2f2;
      border-color: #fecaca;
    }

    .result-icon {
      flex-shrink: 0;
      font-size: 14px;
      margin-top: 1px;
    }

    .result-content {
      flex: 1;
      min-width: 0;
    }

    .result-case {
      font-weight: 700;
      color: #292929;
    }

    .result-address {
      color: #16a34a;
      margin-top: 2px;
      word-wrap: break-word;
    }

    .result-error {
      color: #dc2626;
      margin-top: 2px;
    }

    .result-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }

    .result-tag, .stop-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 3px;
      background: #e0e0e0;
      color: #555;
    }

    .type-tag {
      background: #dbeafe;
      color: #1e40af;
    }

    .date-tag {
      background: #dcfce7;
      color: #166534;
    }

    .result-raw-type {
      display: block;
      font-size: 9px;
      color: #999;
      margin-top: 2px;
      font-style: italic;
    }

    .stop-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 3px;
    }

    .stop-day-header {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #c8102e;
      padding: 8px 0 4px 0;
      border-bottom: 1px solid #e0e0e0;
      margin-bottom: 6px;
    }

    .result-remove {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
      padding: 0 2px;
      line-height: 1;
    }

    .result-remove:hover {
      color: #c8102e;
    }

    /* Stops Tab */
    .stops-list {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 12px;
    }

    .stop-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      background: #f9f9f9;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      margin-bottom: 6px;
    }

    .stop-item:hover {
      border-color: #c8102e;
    }

    .stop-item.home-stop {
      background: #eff6ff;
      border-color: #93c5fd;
    }

    .stop-item.flagged-stop {
      border-left: 3px solid #ea580c;
    }

    .stop-number {
      min-width: 22px;
      height: 22px;
      background: #c8102e;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .stop-number.home {
      background: #2563eb;
    }

    .stop-content {
      flex: 1;
      min-width: 0;
    }

    .stop-address {
      font-size: 12px;
      line-height: 1.4;
      word-wrap: break-word;
      color: #292929;
    }

    .stop-case {
      font-size: 11px;
      color: #666;
      margin-top: 2px;
    }

    .stop-remove {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 16px;
      padding: 0 4px;
      line-height: 1;
    }

    .stop-remove:hover {
      color: #c8102e;
    }

    .empty-state {
      text-align: center;
      padding: 30px 20px;
      color: #999;
    }

    .empty-state-text {
      font-size: 13px;
      line-height: 1.5;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
    }

    /* Add Address Form */
    .add-address-form {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input-field {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }

    .input-field:focus {
      outline: none;
      border-color: #c8102e;
    }

    /* Settings */
    .settings-section {
      border-top: 1px solid #e0e0e0;
      padding-top: 12px;
      margin-top: 12px;
    }

    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 6px 0;
    }

    .settings-toggle-label {
      font-size: 12px;
      font-weight: 600;
      color: #292929;
    }

    .settings-toggle-icon {
      font-size: 11px;
      color: #999;
      transition: transform 0.2s;
    }

    .settings-toggle-icon.open {
      transform: rotate(180deg);
    }

    .settings-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .settings-content.open {
      max-height: 200px;
      margin-top: 10px;
    }

    .settings-field {
      margin-bottom: 10px;
    }

    .settings-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: #292929;
      margin-bottom: 4px;
    }

    .login-notice {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 4px;
      padding: 10px 12px;
      font-size: 11px;
      color: #92400e;
      margin-bottom: 12px;
      line-height: 1.5;
    }

    .login-notice strong {
      display: block;
      margin-bottom: 2px;
    }

    /* Scrollbar styling */
    .tab-content::-webkit-scrollbar,
    .stops-list::-webkit-scrollbar {
      width: 5px;
    }

    .tab-content::-webkit-scrollbar-track,
    .stops-list::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    .tab-content::-webkit-scrollbar-thumb,
    .stops-list::-webkit-scrollbar-thumb {
      background: #c8102e;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-title">
      <h1>Mueller Reports</h1>
      <p>Route Optimizer</p>
    </div>
    <span id="countBadge" class="header-badge" style="display: none;">0 stops</span>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" data-tab="excel">Excel Import</button>
    <button class="tab" data-tab="lookup">Case # Lookup</button>
    <button class="tab" data-tab="stops">Stops</button>
  </div>

  <!-- Excel Import Tab -->
  <div id="tab-excel" class="tab-content active">
    <div id="uploadZone" class="upload-zone">
      <span class="upload-icon">&#128196;</span>
      <div class="upload-text">
        <strong>Drop Excel file here</strong><br>
        or click to browse<br>
        <small>FR Case Mileage .xlsx files</small>
      </div>
      <input type="file" id="fileInput" class="file-input" accept=".xlsx,.xls,.csv">
    </div>

    <div id="fileInfo" class="file-info">
      <span id="fileName" class="file-name"></span>
      <button id="fileRemove" class="file-remove">&#215;</button>
    </div>

    <div id="importPreview" class="import-preview">
      <div id="importSummary" class="import-summary"></div>

      <div id="excelProgressSection" class="progress-section">
        <div class="progress-label">
          <span id="excelProgressText">Looking up addresses...</span>
          <span id="excelProgressCount">0 / 0</span>
        </div>
        <div class="progress-bar">
          <div id="excelProgressFill" class="progress-fill"></div>
        </div>
        <div id="excelProgressStatus" class="progress-status"></div>
      </div>

      <div id="importList"></div>
      <div style="display: flex; gap: 8px; margin-top: 12px;">
        <button id="importAddBtn" class="btn btn-primary" style="flex: 2;" disabled>Add All to Stops</button>
        <button id="importClearBtn" class="btn btn-outline" style="flex: 1;">Clear</button>
      </div>
    </div>
  </div>

  <!-- Case # Lookup Tab -->
  <div id="tab-lookup" class="tab-content">
    <div class="login-notice">
      <strong>Reminder:</strong> You must be logged into mueller-inc.com for case lookup to work.
    </div>

    <div class="case-input-section">
      <label for="caseInput">Enter Case Numbers</label>
      <p>One per line, or comma-separated</p>
      <textarea id="caseInput" placeholder="20484594&#10;20484595&#10;20484596"></textarea>
    </div>

    <button id="lookupBtn" class="btn btn-primary btn-block">Look Up Addresses</button>

    <div id="progressSection" class="progress-section">
      <div class="progress-label">
        <span id="progressText">Looking up cases...</span>
        <span id="progressCount">0 / 0</span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div id="progressStatus" class="progress-status"></div>
    </div>

    <div id="resultsSection" class="results-section" style="display: none;">
      <div class="results-title">Results</div>
      <div id="resultsList"></div>
      <div style="display: flex; gap: 8px; margin-top: 12px;">
        <button id="addSuccessBtn" class="btn btn-primary" style="flex: 2;" disabled>
          Add Found Addresses to Stops
        </button>
        <button id="clearResultsBtn" class="btn btn-outline" style="flex: 1;">Clear</button>
      </div>
    </div>
  </div>

  <!-- Stops Tab -->
  <div id="tab-stops" class="tab-content">
    <div class="add-address-form">
      <input
        type="text"
        id="addressInput"
        class="input-field"
        placeholder="Enter address manually..."
        autocomplete="off"
      >
      <button id="addBtn" class="btn btn-primary btn-small">Add</button>
    </div>

    <div id="stopsList" class="stops-list"></div>

    <div class="action-buttons">
      <button id="clearBtn" class="btn btn-outline" style="flex: 1;">Clear All</button>
      <button id="sendBtn" class="btn btn-primary" style="flex: 2;">Send to Route Optimizer</button>
    </div>

    <!-- Settings -->
    <div class="settings-section">
      <div class="settings-toggle" id="settingsToggle">
        <span class="settings-toggle-label">Settings</span>
        <span class="settings-toggle-icon" id="settingsIcon">&#9660;</span>
      </div>
      <div class="settings-content" id="settingsContent">
        <div class="settings-field">
          <label class="settings-label" for="appUrlInput">Route Optimizer URL</label>
          <input
            type="text"
            id="appUrlInput"
            class="input-field"
            placeholder="https://turrbo.github.io/route-optimizer/"
          >
        </div>
        <button id="saveSettingsBtn" class="btn btn-secondary btn-small">Save Settings</button>
      </div>
    </div>
  </div>

  <script src="xlsx.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
