<!DOCTYPE html>
<html>
<body>
<canvas id="canvas16" width="16" height="16"></canvas>
<canvas id="canvas48" width="48" height="48"></canvas>
<canvas id="canvas128" width="128" height="128"></canvas>
<script>
function createIcon(canvasId, size) {
  const canvas = document.getElementById(canvasId);
  const ctx = canvas.getContext('2d');
  
  // Red background
  ctx.fillStyle = '#c8102e';
  ctx.fillRect(0, 0, size, size);
  
  // White route/path icon
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = size * 0.08;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  
  // Draw a simple route path
  ctx.beginPath();
  ctx.moveTo(size * 0.2, size * 0.3);
  ctx.lineTo(size * 0.5, size * 0.5);
  ctx.lineTo(size * 0.8, size * 0.7);
  ctx.stroke();
  
  // Draw location pins
  const pinSize = size * 0.15;
  drawPin(ctx, size * 0.2, size * 0.3, pinSize);
  drawPin(ctx, size * 0.5, size * 0.5, pinSize);
  drawPin(ctx, size * 0.8, size * 0.7, pinSize);
}

function drawPin(ctx, x, y, size) {
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(x, y, size, 0, Math.PI * 2);
  ctx.fill();
}

createIcon('canvas16', 16);
createIcon('canvas48', 48);
createIcon('canvas128', 128);

// Download links
['16', '48', '128'].forEach(size => {
  const canvas = document.getElementById('canvas' + size);
  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = canvas.toDataURL();
  link.textContent = 'Download ' + size + 'x' + size;
  link.style.display = 'block';
  link.style.margin = '10px';
  document.body.appendChild(link);
});
</script>
</body>
</html>
